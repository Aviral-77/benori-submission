<svg xmlns="http://www.w3.org/2000/svg" width="1340" height="640" viewBox="0 0 1340 640" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1F4E79"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#82b366"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d6b656"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1340" height="640" fill="#ffffff"/>

  <!-- Title -->
  <text x="670" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F4E79">FMCG Deal Intelligence - Pipeline Architecture</text>

  <!-- Sources group -->
  <rect x="20" y="80" width="220" height="180" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="130" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F4E79">Public Sources</text>
  <rect x="35" y="118" width="190" height="55" rx="6" fill="#ffffff" stroke="#6c8ebf"/>
  <text x="130" y="141" text-anchor="middle" font-size="11" fill="#222">Google News RSS</text>
  <text x="130" y="157" text-anchor="middle" font-size="11" fill="#222">(deal queries)</text>
  <rect x="35" y="185" width="190" height="55" rx="6" fill="#ffffff" stroke="#6c8ebf"/>
  <text x="130" y="208" text-anchor="middle" font-size="11" fill="#222">FMCG Trade Press</text>
  <text x="130" y="224" text-anchor="middle" font-size="11" fill="#222">(Food Dive, Just-Food)</text>

  <!-- Stage boxes -->
  <g font-size="11" fill="#ffffff">
    <rect x="300" y="95" width="210" height="150" rx="8" fill="#1F4E79"/>
    <text x="405" y="118" text-anchor="middle" font-size="13" font-weight="bold">Stage 1: Ingest</text>
    <text x="405" y="148" text-anchor="middle">- Fetch RSS/Atom feeds</text>
    <text x="405" y="166" text-anchor="middle">- Parse with stdlib XML</text>
    <text x="405" y="184" text-anchor="middle">- Resolve publisher</text>
    <text x="405" y="202" text-anchor="middle">- Date filter (lookback)</text>

    <rect x="545" y="95" width="210" height="150" rx="8" fill="#1F4E79"/>
    <text x="650" y="118" text-anchor="middle" font-size="13" font-weight="bold">Stage 2: Clean</text>
    <text x="650" y="148" text-anchor="middle">- Exact dedup (URL + title)</text>
    <text x="650" y="166" text-anchor="middle">- Near-dup merge by</text>
    <text x="650" y="184" text-anchor="middle">  entity overlap</text>
    <text x="650" y="202" text-anchor="middle">- Union-find clustering</text>

    <rect x="790" y="95" width="210" height="150" rx="8" fill="#1F4E79"/>
    <text x="895" y="118" text-anchor="middle" font-size="13" font-weight="bold">Stage 3: Score</text>
    <text x="895" y="148" text-anchor="middle">- Relevance (deal + FMCG)</text>
    <text x="895" y="166" text-anchor="middle">- Credibility (source tier</text>
    <text x="895" y="184" text-anchor="middle">  + corroboration bonus)</text>
    <text x="895" y="202" text-anchor="middle">- Extract deal facts</text>

    <rect x="1035" y="95" width="210" height="150" rx="8" fill="#1F4E79"/>
    <text x="1140" y="118" text-anchor="middle" font-size="13" font-weight="bold">Stage 4: Newsletter</text>
    <text x="1140" y="148" text-anchor="middle">- Rank by composite score</text>
    <text x="1140" y="166" text-anchor="middle">- Split lead / brief</text>
    <text x="1140" y="184" text-anchor="middle">- Write summaries</text>
    <text x="1140" y="202" text-anchor="middle">- Add methodology footer</text>
  </g>

  <!-- Main flow arrows -->
  <line x1="240" y1="170" x2="300" y2="170" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="170" x2="545" y2="170" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="755" y1="170" x2="790" y2="170" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1000" y1="170" x2="1035" y2="170" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Optional: sample fallback -->
  <rect x="300" y="320" width="210" height="70" rx="8" fill="#fff2cc" stroke="#d6b656"/>
  <text x="405" y="345" text-anchor="middle" font-size="11" font-style="italic" fill="#7a5c00">Sample dataset</text>
  <text x="405" y="361" text-anchor="middle" font-size="11" font-style="italic" fill="#7a5c00">(fallback if feeds blocked)</text>
  <text x="405" y="377" text-anchor="middle" font-size="11" font-style="italic" fill="#7a5c00">data/sample_articles.json</text>
  <line x1="405" y1="320" x2="405" y2="245" stroke="#d6b656" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowYellow)"/>
  <text x="425" y="285" font-size="10" fill="#7a5c00">fallback</text>

  <!-- Optional: LLM -->
  <rect x="790" y="320" width="210" height="70" rx="8" fill="#fff2cc" stroke="#d6b656"/>
  <text x="895" y="345" text-anchor="middle" font-size="11" font-style="italic" fill="#7a5c00">LLM API</text>
  <text x="895" y="361" text-anchor="middle" font-size="11" font-style="italic" fill="#7a5c00">(optional summaries)</text>
  <text x="895" y="377" text-anchor="middle" font-size="11" font-style="italic" fill="#7a5c00">set LLM_API_KEY</text>
  <path d="M895,320 L895,300 L1140,300 L1140,245" fill="none" stroke="#d6b656" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowYellow)"/>
  <text x="1010" y="294" font-size="10" fill="#7a5c00">optional</text>

  <!-- Outputs group -->
  <rect x="1010" y="400" width="320" height="220" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="1170" y="422" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d6a2d">Outputs</text>
  <g font-size="10.5" fill="#222">
    <rect x="1025" y="436" width="140" height="48" rx="6" fill="#ffffff" stroke="#82b366"/>
    <text x="1095" y="456" text-anchor="middle">Streamlit App</text>
    <text x="1095" y="471" text-anchor="middle">(live demo + downloads)</text>
    <rect x="1175" y="436" width="140" height="48" rx="6" fill="#ffffff" stroke="#82b366"/>
    <text x="1245" y="456" text-anchor="middle">CSV / JSON</text>
    <text x="1245" y="471" text-anchor="middle">(raw data)</text>
    <rect x="1025" y="496" width="140" height="48" rx="6" fill="#ffffff" stroke="#82b366"/>
    <text x="1095" y="516" text-anchor="middle">Excel (.xlsx)</text>
    <text x="1095" y="531" text-anchor="middle">Newsletter + Raw data</text>
    <rect x="1175" y="496" width="140" height="48" rx="6" fill="#ffffff" stroke="#82b366"/>
    <text x="1245" y="516" text-anchor="middle">Word (.docx)</text>
    <text x="1245" y="531" text-anchor="middle">Newsletter</text>
    <rect x="1025" y="556" width="140" height="48" rx="6" fill="#ffffff" stroke="#82b366"/>
    <text x="1095" y="576" text-anchor="middle">PowerPoint (.pptx)</text>
    <text x="1095" y="591" text-anchor="middle">Newsletter slides</text>
    <rect x="1175" y="556" width="140" height="48" rx="6" fill="#ffffff" stroke="#82b366"/>
    <text x="1245" y="576" text-anchor="middle">Markdown (.md)</text>
    <text x="1245" y="591" text-anchor="middle">Newsletter</text>
  </g>
  <!-- Newsletter -> Outputs -->
  <path d="M1140,245 L1140,272 L1170,272 L1170,400" fill="none" stroke="#82b366" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Legend -->
  <rect x="20" y="400" width="300" height="160" rx="6" fill="#f5f5f5" stroke="#666"/>
  <text x="170" y="422" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Legend</text>
  <rect x="40" y="438" width="30" height="20" rx="4" fill="#1F4E79"/>
  <text x="80" y="453" font-size="11" fill="#333">Pipeline stage</text>
  <rect x="40" y="473" width="30" height="20" rx="4" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="80" y="488" font-size="11" fill="#333">Data sources group</text>
  <rect x="40" y="508" width="30" height="20" rx="4" fill="#fff2cc" stroke="#d6b656"/>
  <text x="80" y="523" font-size="11" fill="#333">Optional component (dashed arrow)</text>
</svg>
